# Phase −1 instance spec — E2 bookmarks (EASY tier)
# Scalars only; required/type/pattern/length validation; create/get/list/delete.

id: bookmarks
title: Bookmarks service
tier: easy

resource:
  name: bookmark
  path: /bookmarks
  fields:
    - { name: id,    type: uuid,   generated: true, readonly: true }
    - { name: url,   type: string, required: true, pattern: '^https?://.+' }
    - { name: label, type: string, required: true, min_len: 1, max_len: 120 }

endpoints:
  create: { method: POST,   path: /bookmarks,      success: 201 }
  get:    { method: GET,    path: "/bookmarks/{id}", success: 200, missing: 404 }
  list:   { method: GET,    path: /bookmarks,      success: 200 }
  delete: { method: DELETE, path: "/bookmarks/{id}", success: 204, missing: 404 }

rules:
  on_validation_error: 422
  on_unique_conflict: 409

business_rules: []
