# Phase −1 instance spec — E10 feeds (EASY tier)
# Scalars only; required/type/pattern/length validation; create/get/list/delete.

id: feeds
title: Feeds service
tier: easy

resource:
  name: feed
  path: /feeds
  fields:
    - { name: id,    type: uuid,   generated: true, readonly: true }
    - { name: url,   type: string, required: true, pattern: '^https?://.+' }
    - { name: title, type: string, required: true, min_len: 1, max_len: 200 }

endpoints:
  create: { method: POST,   path: /feeds,      success: 201 }
  get:    { method: GET,    path: "/feeds/{id}", success: 200, missing: 404 }
  list:   { method: GET,    path: /feeds,      success: 200 }
  delete: { method: DELETE, path: "/feeds/{id}", success: 204, missing: 404 }

rules:
  on_validation_error: 422
  on_unique_conflict: 409

business_rules: []
