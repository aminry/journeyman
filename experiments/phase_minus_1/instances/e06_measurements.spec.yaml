# Phase −1 instance spec — E6 measurements (EASY tier)
# Scalars only; numeric range + string length validation; create/get/list/delete.

id: measurements
title: Measurements service
tier: easy

resource:
  name: measurement
  path: /measurements
  fields:
    - { name: id,    type: uuid,   generated: true, readonly: true }
    - { name: value, type: number, required: true, min: 0, max: 100000 }
    - { name: unit,  type: string, required: true, min_len: 1, max_len: 20 }

endpoints:
  create: { method: POST,   path: /measurements,      success: 201 }
  get:    { method: GET,    path: "/measurements/{id}", success: 200, missing: 404 }
  list:   { method: GET,    path: /measurements,      success: 200 }
  delete: { method: DELETE, path: "/measurements/{id}", success: 204, missing: 404 }

rules:
  on_validation_error: 422
  on_unique_conflict: 409

business_rules: []
