# Phase −1 instance spec — M7 recipes (MEDIUM tier)
# Full CRUD incl. partial PATCH; unique slug (→409); enum + datetime + bool-default;
# list with pagination + filter + sort.

id: recipes
title: Recipes service
tier: medium

resource:
  name: recipe
  path: /recipes
  fields:
    - { name: id,           type: uuid,     generated: true, readonly: true }
    - { name: created_at,   type: datetime, generated: true, readonly: true }
    - { name: name,         type: string,   required: true, min_len: 1, max_len: 160 }
    - { name: slug,         type: string,   required: true, unique: true, pattern: '^[a-z0-9-]+$' }
    - { name: difficulty,   type: enum,     required: true, values: [easy, medium, hard] }
    - { name: prep_minutes, type: integer,  required: true, min: 0, max: 1440 }
    - { name: vegetarian,   type: boolean,  default: false }

endpoints:
  create: { method: POST,   path: /recipes,      success: 201 }
  get:    { method: GET,    path: "/recipes/{id}", success: 200, missing: 404 }
  list:
    method: GET
    path: /recipes
    success: 200
    pagination: { limit_param: limit, offset_param: offset, default_limit: 20, max_limit: 100 }
    filters: [difficulty]
    sort: [prep_minutes]
  update: { method: PATCH,  path: "/recipes/{id}", success: 200, missing: 404, partial: true }
  delete: { method: DELETE, path: "/recipes/{id}", success: 204, missing: 404 }

rules:
  on_validation_error: 422
  on_unique_conflict: 409
  timestamps_immutable: true

business_rules: []
