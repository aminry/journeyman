# Phase −1 retrieval gold map — the curated G2 diagnostic key (ADR-0020 G2).
#
# PRE-REGISTERED. This is the *independent* ground truth for "which craft SHOULD be
# retrieved for each instance", used to diagnose a flat reuse curve as a RETRIEVAL MISS
# vs ABSENT COMPOUNDING (the decisive false negative, domain.md §6). It is deliberately
# NOT derived from the retriever: relevance is read off the corpus + the domain feature
# ladder, then keyed to the craft TAXONOMY (the ~13 per-feature items, ADR-0020 §4) and
# resolved to concrete craft ids at runtime.
#
# Authoring rule (frozen; no post-hoc edits after seeing retrieval results):
#   * universals — relevant to EVERY instance because every spec has required fields (→
#     validation), a server-managed id (→ server-managed fields), and is a CRUD service
#     on the fixed stack (crud-spec-template, fastapi-sqlite-scaffold). These match no
#     *distinguishing* feature tag, which is exactly why the auto feature-tag map (the
#     cross-check) misses them and this curated map is the primary key.
#   * list items (medium + hard) — pagination/unique/sort/filter, per domain.md §4.
#   * rule recipes (hard) — one per business rule ACTUALLY present in the frozen spec
#     (taskset.json rule:* tags = the compiled corpus), so the key matches what is built.
#
# Status: FROZEN / APPROVED 2026-06-20 — operator verified line-by-line against the frozen
# taskset (rule recipes match all 10 hard instances incl. coupons=cross_field-only and
# inventory's same-row computed_field). No post-hoc edits after seeing retrieval results
# (ADR-0014 independence — the retriever is not graded against its own author's key).
# Provenance: experiments/phase_minus_1/{domain.md §4, instances/manifest.md,
# taskset.json (protocol v3)}.
taxonomy:
  universal:
    - crud-spec-template
    - fastapi-sqlite-scaffold
    - validation-422-shape
    - server-managed-fields-recipe
  feature_keyed:
